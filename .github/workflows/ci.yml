name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: flexi-react-app

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks redacted secret scan
        working-directory: .
        run: docker run --rm -v "$PWD:/repo" ghcr.io/gitleaks/gitleaks:v8.30.0 detect --source /repo --redact --verbose

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: flexi-react-app/package-lock.json

      - run: npm ci --legacy-peer-deps

      - run: npm run lint

      - run: npm run test

      - run: npm run build
        env:
          # CI build only checks that the bundle compiles; the deploy workflow
          # injects the real Supabase project URL + anon key. Keep these as
          # placeholders so vite doesn't fail the env guard.
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_ANON_KEY: ci_build_only_placeholder
